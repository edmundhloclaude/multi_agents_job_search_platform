<!doctype html>
<html>
<head><title>Apply — Senior Engineer at Acme</title></head>
<body>
  <h1>Apply: Senior Engineer at Acme</h1>
  <form id="app" onsubmit="return finish(event)">
    <label for="full_name">Full Name</label>
    <input id="full_name" name="full_name" type="text" required>
    <label for="email">Email Address</label>
    <input id="email" name="email" type="email" required>
    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="tel">
    <label for="resume">Resume / CV</label>
    <input id="resume" name="resume" type="file">
    <label for="cover">Cover Letter</label>
    <textarea id="cover" name="cover"></textarea>
    <label for="password">Create a password</label>
    <input id="password" name="password" type="password">
    <button type="submit">Submit Application</button>
  </form>
  <div id="status"></div>
  <script>
    function finish(e) {
      e.preventDefault();
      var f = document.getElementById('app');
      var resume = f.resume.files.length ? f.resume.files[0].name : '';
      document.getElementById('status').textContent =
        'SUBMITTED name=' + f.full_name.value +
        ' email=' + f.email.value +
        ' resume=' + resume +
        ' pw=' + (f.password.value ? 'SET' : 'EMPTY');
      f.style.display = 'none';
      return false;
    }
  </script>
</body>
</html>
